services:
  - type: web
    name: asap-design-jeisson-demo
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: ASAP_DEMO_RESET
        value: "true"
      - key: ASAP_DATA_FILE
        value: /var/data/db.json
    disk:
      name: asap-demo-data
      mountPath: /var/data
      sizeGB: 1
